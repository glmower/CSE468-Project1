# this file should be renamed 01-netcfg.yaml in your VM
# enter the following, substituting X with your actual interface

network:
  version: 2
  renderer: networkd
  ethernets:
    enp0sX:
      dhcp4: no
      addresses: [10.0.0.10/8]
      gateway4: 10.0.0.100
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]
